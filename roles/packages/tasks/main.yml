---
# packages — install the host CLIs / tooling from the vendor repos (apt_repos must run first).
# Additive and idempotent: on the live box these are already installed, so applying is a no-op.
# See docs/RECOVERY-GAP-PLAN.md (R1).

- name: Install host CLIs / tooling from vendor repos
  ansible.builtin.apt:
    name: "{{ tooling_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
