---
# The account allowed in from the public internet (root is never allowed from there).
ssh_internet_user: "ai"
# Allow root to log in by PASSWORD (not just key) from trusted sources (Tailscale/cloudflared),
# so a machine with no SSH key can still get in as root. Set false for key-only root.
ssh_trusted_root_password: true
# May the internet user also use a password (in addition to a key)? On a public port this is a
# brute-force surface — fail2ban mitigates; use a strong password. Owner's explicit choice.
ssh_ai_allow_password: true
# "Trusted" sources from which root may log in (key-only). Tailscale ranges + localhost
# (cloudflared hands off from localhost). Confirm the Tailscale IPv6 prefix against the tailnet.
ssh_trusted_sources:
  - "100.64.0.0/10"          # Tailscale IPv4 (CGNAT range)
  - "fd7a:115c:a1e0::/48"    # Tailscale IPv6 (ULA prefix) — VERIFY for this tailnet
  - "127.0.0.1"              # localhost (cloudflared SSH lands here)
  - "::1"
  - "10.0.1.0/24"            # Coolify Docker bridge (root key-only)
# Trusted sources that must remain key-only even when trusted root passwords are enabled.
ssh_trusted_root_key_only_sources:
  - "10.0.1.0/24"
# Trusted sources where the existing break-glass root-password policy remains enabled.
ssh_trusted_root_password_sources:
  - "100.64.0.0/10"
  - "fd7a:115c:a1e0::/48"
  - "127.0.0.1"
  - "::1"
