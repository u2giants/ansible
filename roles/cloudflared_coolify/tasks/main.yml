---
# cloudflared_coolify — manage ONLY Tunnel 1 (coolify.designflow.app): its systemd unit and
# (optionally) its root-only env file. NEVER touch Coolify-managed Tunnels 2 & 3 (mcp/mcpgw).
# Tunnel 1's routing config lives REMOTELY in Cloudflare, so we only manage the unit + token.
#
# ⚠️ TOKEN BLOCKER (2026-06-24): the live token in /etc/cloudflared/coolify-tunnel.env does NOT
# match the 1Password values (`cloudflare-tunnel-tokens` → `cloudflare_tunnel_token`/`cf_gw...`,
# 240 chars vs the live 180). Until the correct token source is reconciled by the owner,
# `cloudflared_manage_token` stays FALSE so this role never overwrites the live, working token
# (doing so would restart and possibly break coolify.designflow.app). The role manages the UNIT
# only (a verbatim copy of the live unit → no-op), which is safe.

- name: Ensure cloudflared config directory exists
  ansible.builtin.file:
    path: /etc/cloudflared
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Install Tunnel 1 systemd unit (verbatim copy of the live unit)
  ansible.builtin.copy:
    src: cloudflared-coolify.service
    dest: "/etc/systemd/system/{{ cloudflared_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

# Token/env: GATED OFF by default (see TOKEN BLOCKER above). Only writes when the owner has
# reconciled the token and sets cloudflared_manage_token=true with a verified token.
- name: Write Tunnel 1 env file (root-only secret)
  ansible.builtin.copy:
    dest: "{{ cloudflared_env_path }}"
    owner: root
    group: root
    mode: "0600"
    content: |
      TUNNEL_TOKEN={{ cloudflared_tunnel_token }}
  no_log: true
  when: cloudflared_manage_token | bool
  notify: Restart cloudflared coolify tunnel

- name: Assert a token was provided when managing it
  ansible.builtin.assert:
    that:
      - cloudflared_tunnel_token | default('') | length > 0
    fail_msg: "cloudflared_manage_token is true but no token was injected (from 1Password)."
  when: cloudflared_manage_token | bool

- name: Flush handlers so the unit is reloaded before we enable it
  ansible.builtin.meta: flush_handlers

# cloudflared_deploy_only (default false) deploys the unit/env + reload but does NOT bring the
# tunnel up (used on a scratch host with no real tunnel). On prod it stays false.
- name: Enable and start Tunnel 1
  ansible.builtin.systemd:
    name: "{{ cloudflared_service_name }}"
    enabled: true
    state: started
  when: not cloudflared_deploy_only | bool

- name: Validate Tunnel 1 is active after any change (plan §4a)
  ansible.builtin.command:
    cmd: "systemctl is-active {{ cloudflared_service_name }}"
  register: cf_active
  changed_when: false
  check_mode: false
  retries: 5
  delay: 3
  until: cf_active.stdout == "active"
  when: not cloudflared_deploy_only | bool
