---
cloudflared_service_name: "cloudflared-coolify"
cloudflared_env_path: "/etc/cloudflared/coolify-tunnel.env"
# Deploy the unit/env without enabling the tunnel (scratch testing). Prod = false.
cloudflared_deploy_only: false
# Token is now reconciled in 1Password as op://vibe_coding/cf-tunnel-coolify/password
# (matches the live tunnel token, verified 2026-06-24). It is injected at apply time via the
# CLOUDFLARED_TUNNEL_TOKEN env var (manual: export it from `op read`; CI: 1password/load-secrets).
cloudflared_tunnel_token: "{{ lookup('ansible.builtin.env', 'CLOUDFLARED_TUNNEL_TOKEN') | default('', true) }}"
# Default FALSE: routine runs manage only the unit and leave the (already-correct) live env
# alone, so a full-playbook apply never needs the token. Set TRUE for a rebuild / CI run that
# must (re)create the env from 1Password — it then writes the same token (no-op, no restart).
cloudflared_manage_token: false
