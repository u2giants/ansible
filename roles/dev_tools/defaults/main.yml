---
# Non-apt tools, version-pinned to what's live on hetz (2026-06-24). Recovery gap R2.
# Bump these when the tools are upgraded so a rebuild reproduces the current versions.
dev_tools_arch: "amd64"          # x86_64
go_version: "1.26.4"
supabase_version: "2.98.2"
# codex: DELIBERATE EXCEPTION to the version-pinning rule above.
# The standalone is canonical (/usr/local/bin/codex -> {{ codex_install_root }}/codex).
# It SELF-UPDATES and the vendor installer exposes no version-pin variable, so a pin
# would be a lie. Ansible guarantees PRESENCE + symlink + this minimum floor + that the
# sandbox actually works. A rebuild installs whatever release the vendor then serves.
# The apt `bubblewrap` package (roles/packages/files/apt-manual.txt) is a hard
# dependency: codex's Linux sandbox uses /usr/bin/bwrap, which the AppArmor profile
# below is attached to.
codex_install_root: "/opt/codex"
codex_min_version: "0.144.5"

# AppArmor exception letting bubblewrap create unprivileged user namespaces.
# Ubuntu 24.04 blocks these (kernel.apparmor_restrict_unprivileged_userns=1), and
# Codex's Linux sandbox needs them via /usr/bin/bwrap — without this, `codex exec`
# SILENTLY writes nothing while `codex --version` still passes. Scoped to the bwrap
# binary rather than turning the host-wide mitigation off. See
# files/apparmor-bwrap for the full rationale + the verification done on hetz.
codex_bwrap_apparmor: true
# Unprivileged user the post-apply verification runs as. Root is NOT subject to the
# userns restriction, so verifying as root would pass even when the fix did nothing.
codex_bwrap_verify_user: "ai"
# Global npm CLIs (idempotent via community.general.npm). codex is handled separately (guarded).
dev_tools_npm:
  - { name: "@anthropic-ai/claude-code", version: "2.1.160" }
  - { name: "@google/gemini-cli", version: "0.44.1" }
  - { name: "corepack", version: "0.34.7" }
  - { name: "npm-check-updates", version: "22.2.1" }
