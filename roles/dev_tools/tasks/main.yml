---
# dev_tools — install the NON-apt host tools, version-pinned, so a rebuild reproduces them
# (Go, supabase, the global npm CLIs, codex, and the cloudflared symlink). Each task is guarded
# by a version check so applying to the live box is a no-op. Recovery gap R2
# (docs/RECOVERY-GAP-PLAN.md). Authenticating these tools after a rebuild stays a manual step.

# ---- Go toolchain (tarball -> /usr/local/go, symlinked into /usr/local/bin) ----
- name: Check installed Go version
  ansible.builtin.command: /usr/local/go/bin/go version
  register: dt_go
  changed_when: false
  failed_when: false
  check_mode: false

- name: Install Go {{ go_version }}
  when: ('go' ~ go_version) not in (dt_go.stdout | default(''))
  block:
    - name: Download Go {{ go_version }}
      ansible.builtin.get_url:
        url: "https://go.dev/dl/go{{ go_version }}.linux-{{ dev_tools_arch }}.tar.gz"
        dest: "/tmp/go{{ go_version }}.tar.gz"
        mode: "0644"
    - name: Remove any previous Go
      ansible.builtin.file:
        path: /usr/local/go
        state: absent
    - name: Extract Go to /usr/local
      ansible.builtin.unarchive:
        src: "/tmp/go{{ go_version }}.tar.gz"
        dest: /usr/local
        remote_src: true
    - name: Symlink go and gofmt into /usr/local/bin
      ansible.builtin.file:
        src: "/usr/local/go/bin/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        state: link
      loop: [go, gofmt]

# ---- supabase CLI (official .deb) ----
- name: Check installed supabase version
  ansible.builtin.command: supabase --version
  register: dt_sb
  changed_when: false
  failed_when: false
  check_mode: false

- name: Install supabase CLI from the official .deb
  ansible.builtin.apt:
    deb: "https://github.com/supabase/cli/releases/download/v{{ supabase_version }}/supabase_{{ supabase_version }}_linux_{{ dev_tools_arch }}.deb"
  when: supabase_version not in (dt_sb.stdout | default(''))

# ---- global npm CLIs (idempotent) ----
- name: Install global npm CLIs (pinned)
  community.general.npm:
    name: "{{ item.name }}"
    version: "{{ item.version }}"
    global: true
    state: present
  loop: "{{ dev_tools_npm }}"
  loop_control:
    label: "{{ item.name }}@{{ item.version }}"

# ---- codex (standalone is canonical; PRESENCE-managed, not version-pinned) ----
# DELIBERATE EXCEPTION to this role's "version-pinned so a rebuild reproduces them"
# rule. Codex ships a self-updating standalone (its releases/ dir already held both
# 0.142.5 and 0.144.5), and the vendor installer exposes no version-pin variable, so a
# pin here would be a lie the tool immediately breaks. Ansible therefore guarantees
# PRESENCE + the symlink + a minimum version + that the sandbox actually works — not a
# byte-exact version. A disaster-recovery rebuild installs whatever release the vendor
# then serves; that is accepted and stated plainly rather than faked.
#
# Why standalone over npm: npm's @openai/codex is a thin JS shim that spawns a
# platform optional-dep binary; it does NOT create /opt/codex. Both were installed, and
# /usr/local/bin/codex pointed at the standalone, so npm's copy was permanently
# shadowed — its only real effect was that the old exact-version guard never matched,
# re-running npm on EVERY apply and threatening to clobber the working symlink.
- name: Remove the shadowed npm codex package (the standalone is canonical)
  community.general.npm:
    name: "@openai/codex"
    global: true
    state: absent

- name: Install the standalone codex (official vendor installer, only when absent)
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -fsSL https://chatgpt.com/codex/install.sh | sh
    creates: "{{ codex_install_root }}/codex"
  args:
    executable: /bin/bash
  environment:
    # Reproduces the layout already on the box:
    #   {{ codex_install_root }}/.codex/packages/standalone/releases/<ver>/...
    #   {{ codex_install_root }}/codex -> .../current/bin/codex
    # CODEX_HOME is deliberately NOT set: the installer defaults it to $HOME/.codex,
    # which is what produced this layout. Setting CODEX_HOME={{ codex_install_root }}
    # would place packages/ at the root instead and yield a DIFFERENT layout.
    HOME: "{{ codex_install_root }}"
    CODEX_INSTALL_DIR: "{{ codex_install_root }}"

- name: Point /usr/local/bin/codex at the standalone
  ansible.builtin.file:
    src: "{{ codex_install_root }}/codex"
    dest: /usr/local/bin/codex
    state: link
    force: true

- name: Read the codex version now in use
  ansible.builtin.command: /usr/local/bin/codex --version
  register: dt_codex
  changed_when: false
  # A missing/broken codex MUST fail the apply. `failed_when: false` here would let a
  # dead codex pass a green apply — the exact silent-failure class this whole change
  # exists to kill, and a violation of the repo's no-silent-failures rule.
  failed_when: not ansible_check_mode and dt_codex.rc != 0
  check_mode: false

- name: Report the codex version in use (auditability — it is not pinned)
  ansible.builtin.debug:
    msg: "codex in use: {{ dt_codex.stdout | default('UNKNOWN') | trim }} (floor {{ codex_min_version }}, vendor-managed/self-updating)"

# Loud failure if codex is unusable OR older than we support. Deliberately NOT gated
# on "a version was parsed" — that would silently skip the check on exactly the broken
# install it exists to catch. Unparseable output is itself a failure.
# NOTE: a passing version says NOTHING about whether the sandbox works — that is the
# trap that hid the original bug. The bwrap verification below is the real check.
- name: Fail if codex is unusable or older than the supported floor
  ansible.builtin.assert:
    that:
      - >-
        (dt_codex.stdout | default('') | regex_search('[0-9]+\.[0-9]+\.[0-9]+')) is not none
        and (dt_codex.stdout | default('') | regex_search('[0-9]+\.[0-9]+\.[0-9]+'))
            is version(codex_min_version, '>=')
    fail_msg: >-
      codex is unusable or below the supported floor {{ codex_min_version }}.
      `codex --version` returned: '{{ dt_codex.stdout | default('') | trim }}'
      (rc={{ dt_codex.rc | default('n/a') }}). Re-run the vendor installer, or lower
      codex_min_version deliberately.
  when: not ansible_check_mode

# ---- AppArmor: let bubblewrap create unprivileged user namespaces (Codex sandbox) ----
# Ubuntu 24.04 blocks unprivileged userns unless the creating binary has a profile
# granting `userns`. Codex's Linux sandbox uses /usr/bin/bwrap, so without this
# `codex exec` silently writes nothing while `codex --version` still passes.
# Scoped to bwrap on purpose — see files/apparmor-bwrap for why NOT the global
# sysctl, and for the A/B verification done on hetz 2026-07-16.
- name: Install AppArmor profile permitting bwrap unprivileged user namespaces
  ansible.builtin.copy:
    src: apparmor-bwrap
    dest: /etc/apparmor.d/bwrap
    owner: root
    group: root
    mode: "0644"
  when: codex_bwrap_apparmor | bool
  register: dt_bwrap_profile

- name: Load the bwrap AppArmor profile
  ansible.builtin.command: apparmor_parser -r /etc/apparmor.d/bwrap
  when:
    - codex_bwrap_apparmor | bool
    - dt_bwrap_profile is changed
    - not ansible_check_mode
  changed_when: true

# Prove the exception actually works, as an UNPRIVILEGED user. Root is not subject
# to the restriction, so a root check would pass even if the profile did nothing.
# Non-fatal: report loudly rather than failing the whole play.
- name: Verify bwrap can create a user namespace as {{ codex_bwrap_verify_user }}
  ansible.builtin.command: bwrap --dev-bind / / --unshare-user true
  become: true
  become_user: "{{ codex_bwrap_verify_user }}"
  register: dt_bwrap_check
  changed_when: false
  failed_when: false
  when:
    - codex_bwrap_apparmor | bool
    - not ansible_check_mode

- name: Report if bwrap user namespaces are still blocked
  ansible.builtin.debug:
    msg: >-
      WARNING: bwrap still cannot create a user namespace as
      {{ codex_bwrap_verify_user }} ({{ dt_bwrap_check.stderr | default('') | trim }}).
      Codex's sandbox will silently write nothing. Verify with:
      `ai-devops doctor` (expects "codex sandbox can write").
  when:
    - codex_bwrap_apparmor | bool
    - not ansible_check_mode
    - dt_bwrap_check.rc | default(0) != 0

# ---- cloudflared symlink (binary is apt-installed by the packages role to /usr/bin) ----
- name: Symlink /usr/local/bin/cloudflared -> /usr/bin/cloudflared (used by Tunnel 1 unit)
  ansible.builtin.file:
    src: /usr/bin/cloudflared
    dest: /usr/local/bin/cloudflared
    state: link
    force: true

# ---- Re-home legacy nasbridge-owned tools to root (gap re-audit 2026-06-25) ----
# On prod these system-wide CLIs were owned by the stray `nasbridge` (uid 1001) — the accidental
# identity that once installed them. /usr/local tooling must be root-owned, and this MUST run
# before the users role removes nasbridge, or the files would be left orphaned on a now-dead uid.
# A fresh rebuild installs them as root already, so this is a no-op there and on a corrected box.
- name: Re-home global CLIs under /usr/local to root (supabase + gemini-cli)
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: root
    group: root
    recurse: "{{ item.recurse | default(false) }}"
    state: "{{ item.state | default('file') }}"
  loop:
    - { path: /usr/local/bin/supabase }
    - { path: /usr/local/lib/node_modules/@google/gemini-cli, state: directory, recurse: true }
  failed_when: false   # paths may be absent on a fresh box before npm/.deb installs run
