# Inventory. One host in scope today; designed to scale to N (plan §2).
# NOTE: in INI [group:vars], inline "# comments" after a value become PART of the value.
# Keep comments on their own lines only — never after `key=value`.

[hetzner]
# Tailscale IP is the preferred path (CI joins the tailnet). Public IP fallback: 178.156.180.212
hetz ansible_host=100.66.37.58

[hetzner:vars]
ansible_user=ai
ansible_python_interpreter=/usr/bin/python3

# --- Throwaway scratch host: prove risky roles here BEFORE prod (plan §8.3, §9) ---
# Stand up a cheap Hetzner/DO box, set its IP, and run with `-e target_hosts=scratch`.
[scratch]
# scratch1 ansible_host=CHANGE_ME ansible_user=root

[scratch:vars]
ansible_python_interpreter=/usr/bin/python3

# --- DigitalOcean backup-wizard droplet: folded in later (plan §2.3) ---
[do_backup_wiz]
# backup-wiz ansible_host=CHANGE_ME ansible_user=root

[all:vars]
ansible_ssh_common_args=-o StrictHostKeyChecking=accept-new
