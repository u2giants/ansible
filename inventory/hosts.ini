# Inventory. One host in scope today; designed to scale to N (plan §2).
#
# Connection facts (plan §2): the CI runner reaches the box over Tailscale (preferred)
# or the public IP. Set ansible_host to the Tailscale IP once CI is on the tailnet;
# the public IP is kept here as a commented fallback.

[hetzner]
hetz ansible_host=100.66.37.58            # Tailscale IP (preferred path from CI)
# hetz ansible_host=178.156.180.212       # public-IP fallback

[hetzner:vars]
ansible_user=ai                           # has passwordless sudo (plan §2)
ansible_python_interpreter=/usr/bin/python3

# --- Throwaway scratch host: prove risky roles here BEFORE prod (plan §8.3, §9) ---
# Stand up a cheap Hetzner/DO box, drop its IP in, and run with -l scratch.
[scratch]
# Throwaway box to prove risky roles before prod (plan §8.3). Set the IP when one is up:
# scratch1 ansible_host=CHANGE_ME ansible_user=root
# Then: ansible-playbook playbooks/site.yml -e target_hosts=scratch --tags <role> \
#         -e enable_phase2=true -e firewall_apply=true -e firewall_use_captured=false \
#         -e firewall_allow_no_docker=true -e cloudflared_deploy_only=true --private-key ~/.ssh/<key>

[scratch:vars]
ansible_python_interpreter=/usr/bin/python3

# --- DigitalOcean backup-wizard droplet: folded in during Phase 4 (plan §2.3) ---
# Managed from the CI runner (this Hetzner box has no SSH path to it).
[do_backup_wiz]
# backup-wiz ansible_host=CHANGE_ME ansible_user=root

[all:vars]
ansible_ssh_common_args=-o StrictHostKeyChecking=accept-new
