---
# Non-secret variables shared across hosts. SECRETS DO NOT GO HERE — they are pulled
# from 1Password at apply time (plan §5.2). Values marked "VERIFY" are seeded from the
# audit and must be reconciled with `bin/discover.sh` output before trusting them.

# ----------------------------------------------------------------------------------
# Phase gating (plan §9). Risky (phase2) roles are skipped unless explicitly enabled,
# so they cannot reach prod before being proven on the scratch host.
# ----------------------------------------------------------------------------------
enable_phase1: true
enable_phase2: false        # flip to true ONLY on scratch, or in a prod maintenance window

# ----------------------------------------------------------------------------------
# Host facts (plan §2)
# ----------------------------------------------------------------------------------
host_timezone: "America/New_York"   # confirmed live 2026-06-23 (timedatectl)
managed_user: "ai"

# ----------------------------------------------------------------------------------
# base role
# ----------------------------------------------------------------------------------
# Explicitly-installed packages to guarantee present. Reconcile with
# discovery/.../packages-manual.txt — do NOT blindly add Coolify/app deps.
base_packages:
  - ca-certificates
  - curl
  - gnupg
  - git
  - jq
  - htop
  - fail2ban
  - netfilter-persistent
  - iptables-persistent
  - unattended-upgrades
  - python3
  - python3-apt          # required for Ansible apt module idempotency
base_unattended_upgrades: true
base_journald_max_use: "1G"   # cap journald disk usage; VERIFY desired size

# ----------------------------------------------------------------------------------
# users role — PUBLIC keys only (plan §4). Real keys belong in 1Password/CI, not git.
# ----------------------------------------------------------------------------------
users_authorized_keys:
  # Owner's key (also used for root over Tailscale). Lets `ai` log in over the internet (key).
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDzgWGrKmHE0Tgds2DDQWN7AwFCBkY6mpRZhinc6Wv0C 916-alien"
  # CI deploy key — GitHub Actions connects as `ai` over Tailscale; private half in
  # 1Password (op://vibe_coding/ci-deploy-ssh/private_key). Added 2026-06-24 (Phase 4).
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAk6qqxljRwTFOuejNLMVoveGlGxPq5WwWjFyUBQ3QEL ci@github-actions-ansible"

# ----------------------------------------------------------------------------------
# dns_hardening role (plan §3.3) — keep the May 2026 outage fixes intact
# ----------------------------------------------------------------------------------
dns_fallback_servers: "1.1.1.1 1.0.0.1 8.8.8.8 8.8.4.4"
docker_live_restore: true      # daemon.json must have live-restore:true and NO dns key

# ----------------------------------------------------------------------------------
# firewall role (plan §3.5, §4a) — Tailscale + SSH must always stay open
# ----------------------------------------------------------------------------------
firewall_apply: false                  # extra guard on top of enable_phase2
firewall_ssh_port: 22
firewall_tailscale_interface: "tailscale0"
firewall_autorevert_seconds: 60        # wrong ruleset un-does itself
# Public-facing TCP ports to allow (besides SSH). VERIFY against iptables-save.
firewall_allowed_tcp:
  - 22       # SSH
  - 80       # HTTP (Traefik/Coolify)
  - 443      # HTTPS (Traefik/Coolify)

# ----------------------------------------------------------------------------------
# docker role (plan §3.3, §4a) — manage daemon.json ONLY; pin engine; never auto-restart
# daemon.json is deployed verbatim from roles/docker/files/daemon.json (captured live).
# ----------------------------------------------------------------------------------
docker_manage_daemon_json: true
docker_ce_version: "5:29.6.0-1~ubuntu.24.04~noble"   # confirmed live 2026-06-23
docker_auto_restart: false     # MUST stay false — a restart hits Coolify + ~20 containers

# ----------------------------------------------------------------------------------
# cron_glue role (plan §4a) — Ansible owns ENTRIES; keeper scripts stay in HiClaw repo
# ----------------------------------------------------------------------------------
cron_glue_entries:
  - name: "tailscale keepalive ping"          # root crontab, confirmed live 2026-06-23
    user: "root"
    job: "tailscale ping -c 1 100.94.183.1 >/dev/null 2>&1"
    minute: "*/4"
  - name: "sync infra docs to git"            # ai crontab, confirmed live 2026-06-23
    user: "{{ managed_user }}"
    job: "/home/ai/bin/sync-infra-docs.sh >> /home/ai/logs/sync-infra-docs.log 2>&1"
    minute: "*/15"
    # The script itself is NOT managed here — it lives in its source repo.
  - name: "sync claude memory across machines"  # ai crontab, added 2026-07-14
    user: "{{ managed_user }}"
    job: "/worksp/ai-devops/bin/ai-memory-sync >> /home/ai/logs/ai-memory-sync.log 2>&1"
    minute: "*/30"
    # Keeper script lives in the ai-devops repo (isolated clone + secret gate);
    # NOT managed here. Ansible owns only that this cron entry exists.
# NOT adopted (app-layer, owned by the HiClaw repo per plan §4a — 5 minute-by-minute
# /worksp/hiclaw/*-keeper.sh entries on the box). Left to that repo on purpose.

# ----------------------------------------------------------------------------------
# cloudflared_coolify role (plan §3.1, §4a) — Tunnel 1 ONLY. Never touch Tunnels 2/3.
# ----------------------------------------------------------------------------------
cloudflared_service_name: "cloudflared-coolify"
cloudflared_env_path: "/etc/cloudflared/coolify-tunnel.env"
# The tunnel TOKEN is a secret -> injected at apply time from 1Password
# (op://vibe_coding/cf-tunnel-hetz), never stored here.
