# Ansible configuration for the host-layer management of the Hetzner box (and,
# later, the DigitalOcean backup-wizard droplet). See README.md for the full brief.
[defaults]
inventory            = inventory/hosts.ini
roles_path           = roles
host_key_checking    = False          # CI runners have no pre-seeded known_hosts
retry_files_enabled  = False
# Modern ansible-core (>=2.13) renders YAML via the default callback's result_format option;
# the old community.general `yaml` stdout callback was removed in newer releases.
stdout_callback        = default
callback_result_format = yaml
callbacks_enabled      = profile_tasks, timer
interpreter_python   = auto_silent
forks                = 10
# Never let a play half-apply silently; show every change.
display_skipped_hosts = True
nocows               = True

[ssh_connection]
# Reuse connections; tolerate the CI runner reaching the box over Tailscale.
pipelining           = True
ssh_args             = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=15 -o ServerAliveCountMax=4

[privilege_escalation]
become              = True
become_method       = sudo
become_user         = root
become_ask_pass     = False           # the `ai` user has passwordless sudo
